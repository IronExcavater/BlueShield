name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        platform: [x64, arm64]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: >
          dotnet restore BlueGuard/BlueGuard.csproj
          -r win-${{ matrix.platform }}
          -p:Configuration=Release
          -p:PublishReadyToRun=false
          -p:PublishTrimmed=false

      - name: Build
        run: >
          dotnet build BlueGuard/BlueGuard.csproj
          -r win-${{ matrix.platform }}
          -c Release
          --no-restore
          -p:PublishReadyToRun=false
          -p:PublishTrimmed=false

      - name: Publish MSIX
        if: startsWith(github.ref, 'refs/tags/v')
        run: >
          dotnet publish BlueGuard/BlueGuard.csproj
          -r win-${{ matrix.platform }}
          -c Release
          --self-contained true
          -p:GenerateAppxPackageOnBuild=true
          -p:AppxPackageSigningEnabled=false

      - name: Upload MSIX
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: BlueGuard-${{ matrix.platform }}
          path: '**/*.msix'
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download MSIX artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: BlueGuard-*
          merge-multiple: true
          path: msix

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create ${{ github.ref_name }}
          msix/*.msix
          --repo ${{ github.repository }}
          --title ${{ github.ref_name }}
          --generate-notes
          --notes "Unsigned MSIX packages, attached for reference/archival only —
          Windows requires MSIX packages to be signed before they can be installed,
          and these are not. BlueGuard is distributed through the Microsoft Store;
          submit these packages via Partner Center rather than installing directly."
