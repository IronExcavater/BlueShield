name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        platform: [x64, arm64]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore BlueGuard/BlueGuard.csproj -r win-${{ matrix.platform }} -p:Configuration=Release

      - name: Build
        run: >
          dotnet build BlueGuard/BlueGuard.csproj
          -r win-${{ matrix.platform }}
          -c Release
          --no-restore

      - name: Publish MSIX
        if: startsWith(github.ref, 'refs/tags/v')
        run: >
          dotnet publish BlueGuard/BlueGuard.csproj
          -r win-${{ matrix.platform }}
          -c Release
          --no-restore
          /p:GenerateAppxPackageOnBuild=true
          /p:AppxPackageSigningEnabled=false

      - name: Upload MSIX
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: BlueGuard-${{ matrix.platform }}-${{ github.ref_name }}
          path: '**/*.msix'
          if-no-files-found: error
