name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    env:
      PACKAGE_VERSION: ""
    strategy:
      matrix:
        include:
          - rid: x64
            msbuildPlatform: x64
          - rid: arm64
            msbuildPlatform: ARM64

    steps:
      - uses: actions/checkout@v4

      # Manifest Version is just a placeholder — derive the real one from the tag.
      - name: Set package version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          $tag = $env:TAG_NAME
          if ($tag -notmatch '^v(\d+\.\d+\.\d+\.\d+)$') {
            Write-Error "Tag '$tag' must look like vMAJOR.MINOR.BUILD.REVISION to become the MSIX package version."
            exit 1
          }
          $version = $Matches[1]

          $manifestPath = "BlueGuard/Package.appxmanifest"
          [xml]$manifest = Get-Content $manifestPath
          $ns = New-Object System.Xml.XmlNamespaceManager($manifest.NameTable)
          $ns.AddNamespace("n", "http://schemas.microsoft.com/appx/manifest/foundation/windows10")
          $manifest.SelectSingleNode("//n:Identity", $ns).SetAttribute("Version", $version)
          $manifest.Save((Resolve-Path $manifestPath))

          echo "PACKAGE_VERSION=$version" >> $env:GITHUB_ENV

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: >
          dotnet restore BlueGuard/BlueGuard.csproj
          -r win-${{ matrix.rid }}
          -p:Platform=${{ matrix.msbuildPlatform }}
          -p:Configuration=Release
          -p:PublishReadyToRun=false
          -p:PublishTrimmed=false

      - name: Build
        run: >
          dotnet build BlueGuard/BlueGuard.csproj
          -r win-${{ matrix.rid }}
          -p:Platform=${{ matrix.msbuildPlatform }}
          -c Release
          --no-restore
          -p:PublishReadyToRun=false
          -p:PublishTrimmed=false

      - name: Publish MSIX
        if: startsWith(github.ref, 'refs/tags/v')
        run: >
          dotnet publish BlueGuard/BlueGuard.csproj
          -r win-${{ matrix.rid }}
          -p:Platform=${{ matrix.msbuildPlatform }}
          -c Release
          --self-contained true
          -p:GenerateAppxPackageOnBuild=true
          -p:AppxPackageSigningEnabled=false
          -p:Version=${{ env.PACKAGE_VERSION }}

      - name: Upload MSIX
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: BlueGuard-${{ matrix.rid }}
          path: '**/*.msix'
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download MSIX artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: BlueGuard-*
          merge-multiple: true
          path: msix

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          shopt -s globstar
          gh release create "$TAG_NAME" \
            msix/**/BlueGuard_*.msix \
            --repo "$REPO" \
            --title "$TAG_NAME" \
            --generate-notes \
            --notes "Unsigned MSIX packages, attached for reference/archival only — Windows requires MSIX packages to be signed before they can be installed, and these are not. BlueGuard is distributed through the Microsoft Store; submit these packages via Partner Center rather than installing directly."
